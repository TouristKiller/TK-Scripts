name: Build TK Action Capture

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    paths:
      - "TK Workbench/Native/TKActionCapture/**"
      - ".github/workflows/build-tk-action-capture.yml"

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            build_dir: windows-x64
            extension: dll
            artifact: tk-action-capture-windows-x64
          - name: macOS Universal
            os: macos-latest
            build_dir: macos-universal
            extension: dylib
            artifact: tk-action-capture-macos-universal
          - name: Linux x64
            os: ubuntu-latest
            build_dir: linux-x64
            extension: so
            artifact: tk-action-capture-linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $source = "TK Workbench/Native/TKActionCapture"
          $build = Join-Path $source "build/${{ matrix.build_dir }}"
          cmake -S $source -B $build -DCMAKE_BUILD_TYPE=Release

      - name: Configure macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          source="TK Workbench/Native/TKActionCapture"
          build="$source/build/${{ matrix.build_dir }}"
          cmake -S "$source" -B "$build" -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"

      - name: Configure Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          source="TK Workbench/Native/TKActionCapture"
          build="$source/build/${{ matrix.build_dir }}"
          cmake -S "$source" -B "$build" -DCMAKE_BUILD_TYPE=Release

      - name: Build Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $source = "TK Workbench/Native/TKActionCapture"
          $build = Join-Path $source "build/${{ matrix.build_dir }}"
          cmake --build $build --config Release

      - name: Build Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          source="TK Workbench/Native/TKActionCapture"
          build="$source/build/${{ matrix.build_dir }}"
          cmake --build "$build" --config Release

      - name: Stage artifact Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifact = "artifacts/${{ matrix.artifact }}"
          New-Item -ItemType Directory -Force -Path $artifact | Out-Null
          $file = Get-ChildItem -Path "TK Workbench/Native/TKActionCapture/build/${{ matrix.build_dir }}" -Filter "reaper_tk_action_capture.${{ matrix.extension }}" -Recurse | Select-Object -First 1
          if (-not $file) { throw "Artifact not found: reaper_tk_action_capture.${{ matrix.extension }}" }
          Copy-Item $file.FullName $artifact

      - name: Stage artifact Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          artifact="artifacts/${{ matrix.artifact }}"
          mkdir -p "$artifact"
          file=$(find "TK Workbench/Native/TKActionCapture/build/${{ matrix.build_dir }}" -name "reaper_tk_action_capture.${{ matrix.extension }}" -type f | head -n 1)
          if [ -z "$file" ]; then
            echo "Artifact not found: reaper_tk_action_capture.${{ matrix.extension }}"
            find "TK Workbench/Native/TKActionCapture/build/${{ matrix.build_dir }}" -maxdepth 4 -type f
            exit 1
          fi
          cp "$file" "$artifact/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/${{ matrix.artifact }}